---
layout: default
title: Visual Archive
---

<main class="archive">
  <header class="archive-header">
    <h1>Visual Archive</h1>
    <p>Painted record portraits and cultural artifacts.</p>
  </header>

  <section class="gallery">
    {% for artwork in site.data.artworks %}
      <article class="art-card">
        <img
          src="{{ artwork.image | relative_url }}"
          alt="{{ artwork.title }}"
          loading="lazy"
        >
        <h2>{{ artwork.title }}</h2>
        <p>{{ artwork.year }} · {{ artwork.medium }}</p>
      </article>
    {% endfor %}
  </section>
</main>
